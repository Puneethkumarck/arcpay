spring:
  application:
    name: compliance-service
  cloud:
    openfeign:
      circuitbreaker:
        enabled: true
        alphanumeric-ids:
          enabled: true
  datasource:
    url: jdbc:postgresql://localhost:5432/arcpay_compliance
    username: ${DB_USERNAME:arcpay}
    password: ${DB_PASSWORD:arcpay}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      group-id: compliance
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: com.arcpay.compliance.domain.event
  temporal:
    service-address: ${TEMPORAL_ADDRESS:localhost:7233}
    namespace: arcpay
    workers-auto-discovery:
      packages: com.arcpay.compliance

namastack:
  outbox:
    poll-interval: 2000
    batch-size: 20
    jdbc:
      table-prefix: "compliance_"
      schema-initialization:
        enabled: false
    retry:
      policy: exponential
      max-retries: 5
      exponential:
        initial-delay: 1000
        max-delay: 60000
        multiplier: 2.0

temporal:
  task-queue: ComplianceTaskQueue

compliance:
  screening:
    hold-threshold: 50
  sanctions:
    refresh-cron: "0 0 */6 * * *"
    poll-interval-ms: 60000
    staleness-warn-hours: 12
    staleness-critical-hours: 24
    staleness-check-interval-ms: 3600000
    download-timeout-seconds: 30
    sources: [OFAC_SDN, OFAC_NONSDN, UN, EU, UK_HMT]
    source-urls:
      OFAC_SDN: ${SANCTIONS_OFAC_SDN_URL:https://www.treasury.gov/ofac/downloads/sdn.xml}
      OFAC_NONSDN: ${SANCTIONS_OFAC_NONSDN_URL:https://www.treasury.gov/ofac/downloads/consolidated/cons_prim.csv}
      UN: ${SANCTIONS_UN_URL:https://scsanctions.un.org/resources/xml/en/consolidated.xml}
      EU: ${SANCTIONS_EU_URL:https://webgate.ec.europa.eu/fsd/fsf/public/files/xmlFullSanctionsList_1_1/content}
      UK_HMT: ${SANCTIONS_UK_HMT_URL:https://ofsistorage.blob.core.windows.net/publishlive/2022format/ConList.csv}
  onchain:
    rpc-url: ${ARC_RPC_URL:}
    usdc-contract: ${ARC_USDC_ADDRESS}
    scan-block-window: 50000
    mixer-addresses: []
    mixer-score: 50

resilience4j:
  circuitbreaker:
    configs:
      default:
        failure-rate-threshold: 50
        sliding-window-size: 10
        minimum-number-of-calls: 10
        wait-duration-in-open-state: 30s
        permitted-number-of-calls-in-half-open-state: 3
        ignore-exceptions:
          - feign.FeignException$NotFound
  timelimiter:
    configs:
      default:
        timeout-duration: 3s
        cancel-running-future: true

arcpay:
  identity-service:
    url: ${IDENTITY_SERVICE_URL:http://localhost:8080}
  security:
    service-token: ${SERVICE_AUTH_TOKEN:}

management:
  endpoints:
    web:
      exposure:
        include: health, info, metrics, prometheus
  endpoint:
    health:
      show-details: when-authorized
      probes:
        enabled: true
  health:
    db:
      enabled: true
    kafka:
      enabled: true
  metrics:
    tags:
      application: ${spring.application.name}
