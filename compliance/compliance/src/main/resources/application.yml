spring:
  application:
    name: compliance-service
  datasource:
    url: jdbc:postgresql://localhost:5432/arcpay_compliance
    username: ${DB_USERNAME:arcpay}
    password: ${DB_PASSWORD:arcpay}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      group-id: compliance
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: com.arcpay.compliance.domain.event
  temporal:
    service-address: ${TEMPORAL_ADDRESS:localhost:7233}
    namespace: arcpay
    workers-auto-discovery:
      packages: com.arcpay.compliance

namastack:
  outbox:
    poll-interval: 2000
    batch-size: 20
    jdbc:
      table-prefix: "compliance_"
      schema-initialization:
        enabled: false
    retry:
      policy: exponential
      max-retries: 5
      exponential:
        initial-delay: 1000
        max-delay: 60000
        multiplier: 2.0

temporal:
  task-queue: ComplianceTaskQueue

compliance:
  screening:
    hold-threshold: 50
  sanctions:
    refresh-cron: "0 0 */6 * * *"
    poll-interval-ms: 60000
    staleness-warn-hours: 12
    staleness-critical-hours: 24
    sources: [OFAC_SDN, OFAC_NONSDN, UN, EU, UK_HMT]
  onchain:
    usdc-contract: ${ARC_USDC_ADDRESS}
    scan-block-window: 50000
    mixer-addresses: []

arcpay:
  security:
    service-token: ${SERVICE_AUTH_TOKEN:}

management:
  endpoints:
    web:
      exposure:
        include: health, info, metrics, prometheus
  endpoint:
    health:
      show-details: when-authorized
      probes:
        enabled: true
  health:
    db:
      enabled: true
    kafka:
      enabled: true
  metrics:
    tags:
      application: ${spring.application.name}
