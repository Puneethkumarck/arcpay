server:
  port: 8081

spring:
  application:
    name: policy-engine
  cloud:
    openfeign:
      circuitbreaker:
        # Wraps every Feign call in a Resilience4j circuit breaker + time limiter. The
        # breaker id is derived per Feign method (e.g. IdentityServiceClientgetAgent); the
        # shared resilience4j `default` config below applies to all of them.
        enabled: true
        alphanumeric-ids:
          enabled: true
  datasource:
    url: jdbc:postgresql://localhost:5432/arcpay_policy
    username: ${DB_USERNAME:arcpay}
    password: ${DB_PASSWORD:arcpay}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      group-id: policy-engine
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: com.arcpay.policy.policyengine.domain.event

# Spring Cloud OpenFeign derives the circuit-breaker id from the Feign client name + method
# signature (e.g. IdentityServiceClientgetAgentUUID), so we configure the shared `default`
# config that applies to every Resilience4j instance rather than naming each one.
resilience4j:
  circuitbreaker:
    configs:
      default:
        failure-rate-threshold: 50
        sliding-window-size: 10
        minimum-number-of-calls: 10
        wait-duration-in-open-state: 30s
        permitted-number-of-calls-in-half-open-state: 3
  timelimiter:
    configs:
      default:
        timeout-duration: 3s
        cancel-running-future: true

arcpay:
  identity-service:
    url: http://localhost:8080
  security:
    service-token: ${SERVICE_AUTH_TOKEN:}
  policy:
    evaluation:
      retention-days: ${POLICY_EVALUATION_RETENTION_DAYS:90}
      cleanup-cron: ${POLICY_EVALUATION_CLEANUP_CRON:0 0 2 * * *}

namastack:
  outbox:
    poll-interval: 2000
    batch-size: 20
    jdbc:
      table-prefix: "policyengine_"
      schema-initialization:
        enabled: false
    retry:
      policy: exponential
      max-retries: 5
      exponential:
        initial-delay: 1000
        max-delay: 60000
        multiplier: 2.0

management:
  endpoints:
    web:
      exposure:
        include: health, info, metrics, prometheus
  endpoint:
    health:
      show-details: when-authorized
      probes:
        enabled: true
  health:
    db:
      enabled: true
    kafka:
      enabled: true
  metrics:
    tags:
      application: ${spring.application.name}
    distribution:
      percentiles-histogram:
        http.server.requests: true
